<!DOCTYPE html><html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اختبار فتح المتصفح الخارجي</title>
Test
<script>
// ======================================
// In-App Browser Detection & External Open
// ======================================

(function () {

    function isInAppBrowser() {
        const ua = navigator.userAgent || "";

        return (
            ua.includes("FBAN") ||
            ua.includes("FBAV") ||
            ua.includes("Instagram") ||
            ua.includes("Messenger")
        );
    }

    function isAndroid() {
        return /Android/i.test(navigator.userAgent);
    }

    function createOpenBrowserPopup() {

        if (document.getElementById("external-browser-popup")) {
            return;
        }

        const popup = document.createElement("div");

        popup.id = "external-browser-popup";

        popup.innerHTML = `
            <div id="external-browser-card">
                <h3>فتح الموقع في المتصفح الخارجي</h3>

                <p>
                    للحصول على أفضل أداء أثناء التبادل وإتمام العمليات
                    يُفضل فتح الموقع في Chrome أو Safari.
                </p>

                <button id="external-browser-btn">
                    فتح في المتصفح الخارجي
                </button>

                <button id="close-browser-popup">
                    متابعة داخل التطبيق
                </button>
            </div>
        `;

        document.body.appendChild(popup);

        const style = document.createElement("style");

        style.textContent = `
            #external-browser-popup{
                position:fixed;
                inset:0;
                background:rgba(0,0,0,.75);
                backdrop-filter:blur(6px);
                z-index:999999;
                display:flex;
                justify-content:center;
                align-items:center;
                padding:20px;
            }

            #external-browser-card{
                width:100%;
                max-width:420px;
                background:#fff;
                border-radius:18px;
                padding:24px;
                text-align:center;
            }

            #external-browser-card h3{
                margin-bottom:12px;
            }

            #external-browser-card p{
                margin-bottom:20px;
                line-height:1.8;
            }

            #external-browser-btn{
                width:100%;
                border:none;
                padding:14px;
                border-radius:12px;
                cursor:pointer;
                color:#fff;
                font-size:15px;
                font-weight:bold;
                background:#5b3bb0;
                margin-bottom:10px;
            }

            #close-browser-popup{
                width:100%;
                border:none;
                padding:14px;
                border-radius:12px;
                cursor:pointer;
                background:#ececec;
            }
        `;

        document.head.appendChild(style);

        document
            .getElementById("external-browser-btn")
            .addEventListener("click", openExternalBrowser);

        document
            .getElementById("close-browser-popup")
            .addEventListener("click", () => {
                popup.remove();
            });
    }

    function openExternalBrowser() {

        const currentUrl = window.location.href;

        if (isAndroid()) {

            const cleanUrl =
                currentUrl.replace(/^https?:\/\//, "");

            window.location.href =
                `intent://${cleanUrl}#Intent;scheme=https;package=com.android.chrome;end`;

        } else {

            window.open(currentUrl, "_blank");
        }
    }

    document.addEventListener("DOMContentLoaded", () => {

        if (!isInAppBrowser()) {
            return;
        }

        createOpenBrowserPopup();

        // محاولة تلقائية بعد ثانية ونصف
        setTimeout(() => {

            if (isAndroid()) {
                openExternalBrowser();
            }

        }, 1500);
    });

})();
       
</script></body>
</html>
